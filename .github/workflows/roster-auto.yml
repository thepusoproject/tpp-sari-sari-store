name: Roster auto-sync

on:
  issues:
    types: [opened, edited]

jobs:
  sync:
    if: ${{ startsWith(github.event.issue.title || '', 'Roster signup:') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update roster from issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          python3 scripts/add_student_from_issue.py

      - name: Rebuild gradeboard data
        run: |
          python3 scripts/build_gradeboard.py

      - name: Commit roster + gradeboard changes
        run: |
          if git diff --quiet gradeboard/roster.json docs/grades.json; then
            echo "No roster changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradeboard/roster.json docs/grades.json
          git commit -m "Sync roster from issue #${{ github.event.issue.number }}"
          git push
